name: Stable Release

on:
  push:
    branches: [main]
    paths:
      # Include: code yang affect installer
      - 'ShaPrint.WpfApp/**'
      - 'ShaPrint.Updater/**'
      - 'ShaPrint.Core/**'
      - 'ShaPrint.Tests/**'
      - 'ShaPrint.sln'
      - 'installer.iss'
      
      # Exclude: docs, config, workflow
      - '!**/*.md'
      - '!docs/**'
      - '!.github/workflows/**'
      - '!.gitignore'
      - '!*.txt'

jobs:
  stable-release:
    environment: prod
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Generate Stable Version
      id: version
      shell: bash
      run: |
        # Ambil stable tag terakhir
        LATEST_STABLE=$(git tag -l "*-stable" | sort -V | tail -n1)
        
        if [ -z "$LATEST_STABLE" ]; then
          # Jika belum ada stable, mulai dari 1.0.0
          MAJOR=1
          MINOR=0
          PATCH=0
        else
          # Extract version dari stable tag (v1.2.3-stable → 1.2.3)
          VERSION=${LATEST_STABLE#v}
          VERSION=${VERSION%-stable}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
        fi
        
        # Analisis commits sejak stable terakhir untuk determine bump type
        if [ -z "$LATEST_STABLE" ]; then
          COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || echo "")
        else
          COMMITS=$(git log ${LATEST_STABLE}..HEAD --pretty=format:"%s" 2>/dev/null || echo "")
        fi
        
        # Determine version bump berdasarkan conventional commits
        # Breaking change: "feat!:", "fix!:", "BREAKING CHANGE", atau "<type>(<scope>)!:"
        if echo "$COMMITS" | grep -qE "^[a-z]+(\(.*\))?!:|BREAKING CHANGE"; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
          BUMP_TYPE="major"
        # Feature: "feat:" atau "feat(<scope>):"
        elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
          MINOR=$((MINOR + 1))
          PATCH=0
          BUMP_TYPE="minor"
        # Fix: "fix:" atau "fix(<scope>):"
        elif echo "$COMMITS" | grep -qE "^fix(\(.*\))?:"; then
          PATCH=$((PATCH + 1))
          BUMP_TYPE="patch"
        else
          # Default: patch bump jika ada commit lainnya
          PATCH=$((PATCH + 1))
          BUMP_TYPE="patch (default)"
        fi
        
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "New stable version: $NEW_VERSION (bump: $BUMP_TYPE)"
        echo ""
        echo "Commits analyzed:"
        echo "$COMMITS" | head -20

    - name: Run Tests
      run: dotnet test -c Release

    - name: Validate PSK Secret
      shell: bash
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        if [ -z "$SHAPRINT_PSK" ]; then
          echo "::error::SHAPRINT_PSK secret is empty or not set in GitHub Actions. Build cannot proceed."
          exit 1
        fi
        if [ ${#SHAPRINT_PSK} -lt 32 ]; then
          echo "::error::SHAPRINT_PSK secret must be at least 32 characters long. Current length: ${#SHAPRINT_PSK}."
          exit 1
        fi

    - name: Publish .NET Application
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        dotnet publish ShaPrint.WpfApp/ShaPrint.WpfApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.version.outputs.version }}
        dotnet publish ShaPrint.Updater/ShaPrint.Updater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.version.outputs.version }}

    - name: Build Installer (Inno Setup)
      shell: bash
      env:
        MSYS_NO_PATHCONV: 1
      run: |
        "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.version }}" "/DMyAppOutput=ShaPrint_Setup_v${{ steps.version.outputs.version }}-stable" installer.iss

    - name: Create and Push Tag
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Delete tag if exists (for workflow retry)
        git tag -d "v${{ steps.version.outputs.version }}-stable" 2>/dev/null || true
        git push origin ":refs/tags/v${{ steps.version.outputs.version }}-stable" 2>/dev/null || true
        # Create and push new tag
        git tag -a "v${{ steps.version.outputs.version }}-stable" -m "Stable release v${{ steps.version.outputs.version }}"
        git push origin "v${{ steps.version.outputs.version }}-stable"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/ShaPrint_Setup_v${{ steps.version.outputs.version }}-stable.exe
        tag_name: v${{ steps.version.outputs.version }}-stable
        name: ShaPrint v${{ steps.version.outputs.version }} (Stable)
        generate_release_notes: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
