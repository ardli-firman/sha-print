name: Beta Release

on:
  push:
    branches: [develop]
    paths:
      # Include: code yang affect installer
      - 'ShaPrint.WpfApp/**'
      - 'ShaPrint.Updater/**'
      - 'ShaPrint.Core/**'
      - 'ShaPrint.Tests/**'
      - 'ShaPrint.sln'
      - 'installer.iss'
      
      # Exclude: docs, config, workflow
      - '!**/*.md'
      - '!docs/**'
      - '!.github/workflows/**'
      - '!.gitignore'
      - '!*.txt'

jobs:
  beta-release:
    environment: prod
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Generate Beta Version
      id: version
      shell: bash
      run: |
        LATEST_STABLE=$(git tag -l "*-stable" | sort -V | tail -n1)
        
        if [ -z "$LATEST_STABLE" ]; then
          BASE_VERSION="1.0.0"
        else
          # Extract base version dari stable tag (v1.2.3-stable → 1.2.3)
          BASE_VERSION=${LATEST_STABLE#v}
          BASE_VERSION=${BASE_VERSION%-stable}
        fi
        
        LATEST_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" | sort -V | tail -n1)
        
        if [ -z "$LATEST_BETA" ]; then
          BETA_COUNTER=1
        else
          BETA_COUNTER=${LATEST_BETA##*-beta.}
          BETA_COUNTER=$((BETA_COUNTER + 1))
        fi
        
        NEW_VERSION="${BASE_VERSION}-beta.${BETA_COUNTER}"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
        echo "beta_counter=$BETA_COUNTER" >> $GITHUB_OUTPUT
        echo "New beta version: $NEW_VERSION"

    - name: Run Tests
      run: dotnet test -c Release

    - name: Validate PSK Secret
      shell: bash
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        if [ -z "$SHAPRINT_PSK" ]; then
          echo "::error::SHAPRINT_PSK secret is empty or not set in GitHub Actions. Build cannot proceed."
          exit 1
        fi
        if [ ${#SHAPRINT_PSK} -lt 32 ]; then
          echo "::error::SHAPRINT_PSK secret must be at least 32 characters long. Current length: ${#SHAPRINT_PSK}."
          exit 1
        fi

    - name: Publish .NET Application
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        dotnet publish ShaPrint.WpfApp/ShaPrint.WpfApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.version.outputs.base_version }}.${{ steps.version.outputs.beta_counter }}
        dotnet publish ShaPrint.Updater/ShaPrint.Updater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.version.outputs.base_version }}.${{ steps.version.outputs.beta_counter }}

    - name: Build Installer (Inno Setup)
      shell: bash
      env:
        MSYS_NO_PATHCONV: 1
      run: |
        "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.base_version }}" "/DMyAppOutput=ShaPrint_Setup_v${{ steps.version.outputs.version }}" installer.iss

    - name: Create and Push Tag
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Delete tag if exists (for workflow retry)
        git tag -d "v${{ steps.version.outputs.version }}" 2>/dev/null || true
        git push origin ":refs/tags/v${{ steps.version.outputs.version }}" 2>/dev/null || true
        # Create and push new tag
        git tag -a "v${{ steps.version.outputs.version }}" -m "Beta release v${{ steps.version.outputs.version }}"
        git push origin "v${{ steps.version.outputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/ShaPrint_Setup_v${{ steps.version.outputs.version }}.exe
        tag_name: v${{ steps.version.outputs.version }}
        name: ShaPrint v${{ steps.version.outputs.version }} (Beta)
        generate_release_notes: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
