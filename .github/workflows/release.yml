name: Release Workflow

on:
  push:
    tags:
      - '*-stable' # e.g., v1.0.0-stable
      - '*-beta' # e.g., v1.0.0-beta

jobs:
  build-and-release:
    environment: prod
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run Tests
      run: dotnet test -c Release

    - name: Extract Version
      id: extract_version
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        CLEAN_TAG=${TAG_NAME%-stable}
        CLEAN_TAG=${CLEAN_TAG%-beta}
        VERSION=${CLEAN_TAG#v}
        echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        if [[ "$TAG_NAME" == *"-beta" ]]; then
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
        fi

    - name: Validate PSK Secret
      shell: bash
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        if [ -z "$SHAPRINT_PSK" ]; then
          echo "::error::SHAPRINT_PSK secret is empty or not set in GitHub Actions. Build cannot proceed."
          exit 1
        fi
        if [ ${#SHAPRINT_PSK} -lt 32 ]; then
          echo "::error::SHAPRINT_PSK secret must be at least 32 characters long. Current length: ${#SHAPRINT_PSK}."
          exit 1
        fi

    - name: Publish .NET Application
      env:
        SHAPRINT_PSK: ${{ secrets.SHAPRINT_PSK }}
      run: |
        dotnet publish ShaPrint.WpfApp/ShaPrint.WpfApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.extract_version.outputs.version }}
        dotnet publish ShaPrint.Updater/ShaPrint.Updater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.extract_version.outputs.version }}

    - name: Build Installer (Inno Setup)
      run: |
        & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "/DMyAppVersion=${{ steps.extract_version.outputs.version }}" "/DMyAppOutput=ShaPrint_Setup_v${{ steps.extract_version.outputs.version }}" installer.iss

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/ShaPrint_Setup_v${{ steps.extract_version.outputs.version }}.exe
        generate_release_notes: true
        name: Release v${{ steps.extract_version.outputs.version }}
        prerelease: ${{ steps.extract_version.outputs.is_prerelease == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
